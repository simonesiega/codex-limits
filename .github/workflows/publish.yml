name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (for example, 1.2.3)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node --print "require('./package.json').version")"
          if [ -n "$EXPECTED_VERSION" ] && [ "$EXPECTED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Requested version $EXPECTED_VERSION does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi
          if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi

      - name: Run project checks
        run: bun run check

      - name: Publish package
        run: npm publish --ignore-scripts --access public
