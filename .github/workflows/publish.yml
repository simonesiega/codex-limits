name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (for example, 1.2.3)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify release version
        id: release
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node --print "require('./package.json').version")"
          if [ -n "$EXPECTED_VERSION" ] && [ "$EXPECTED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Requested version $EXPECTED_VERSION does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi
          if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi
          if [[ "$PACKAGE_VERSION" == *-* || "$RELEASE_PRERELEASE" == "true" ]]; then
            echo "npm-tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run project checks
        run: bun run check

      - name: Publish package
        env:
          NPM_TAG: ${{ steps.release.outputs.npm-tag }}
        run: npm publish --ignore-scripts --access public --provenance --tag "$NPM_TAG"
